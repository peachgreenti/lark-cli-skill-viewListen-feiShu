# ============================================================
# FAQ 知识库示例
# ============================================================
# 每条 FAQ 包含：
#   - keywords: 关键词列表（用于 keyword 模式匹配）
#   - question: 问题描述（用于 fuzzy 模式匹配及展示）
#   - answer:   回复内容

faqs:
  - keywords:
      - "部署"
      - "上线"
      - "发布"
    question: "如何部署和上线服务？"
    answer: |
      部署流程如下：
      1. 确保所有代码已合并到 main 分支并通过 CI 检查
      2. 在飞书审批中提交上线申请
      3. 等待审批通过后，由运维同学执行部署
      4. 部署完成后在群里通知相关同学进行验证

  - keywords:
      - "请假"
      - "休假"
      - "年假"
    question: "如何申请请假？"
    answer: |
      请假流程：
      1. 打开飞书 -> 工作台 -> 审批
      2. 选择「请假」审批模板
      3. 填写请假类型、起止时间、请假事由
      4. 提交审批，等待主管确认
      请提前至少1个工作日提交请假申请。

  - keywords:
      - "VPN"
      - "vpn"
      - "远程连接"
    question: "如何连接公司 VPN？"
    answer: |
      VPN 连接指南：
      1. 下载并安装飞书 VPN 客户端（飞书 -> 工作台 -> VPN）
      2. 使用飞书账号扫码登录
      3. 选择对应的办公网络节点
      4. 点击连接即可
      如遇问题请联系 IT 支持（分机 8888）。

  - keywords:
      - "WiFi"
      - "wifi"
      - "无线网络"
      - "网络"
    question: "公司 WiFi 如何连接？"
    answer: |
      公司无线网络信息：
      - 网络名称：Company-Staff
      - 认证方式：802.1X（使用飞书账号登录）
      - 如需访客网络：Company-Guest（需前台提供临时密码）
      详细配置请参考内部 Wiki：https://wiki.internal/network/wifi

  - keywords:
      - "报销"
      - "发票"
      - "费用"
    question: "如何提交费用报销？"
    answer: |
      报销流程：
      1. 收集并整理好发票（电子发票或纸质发票照片）
      2. 打开飞书 -> 工作台 -> 审批 -> 费用报销
      3. 填写报销明细（金额、事由、项目编号）
      4. 上传发票附件
      5. 提交审批，财务会在5个工作日内处理
      注意：单笔超过5000元需额外附部门经理审批意见。
