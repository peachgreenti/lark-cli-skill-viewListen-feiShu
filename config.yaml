# ============================================
# 飞书消息监听 + AI 分类 + 每日摘要 配置文件
# ============================================

# ---- 监听配置 ----
listener:
  event_name: "im.message.receive_v1"
  output_format: "ndjson"
  allowed_chat_ids:
    - "oc_0fbad9383486e3e43300f2daee013845"  # 机器人功能体验群
  ignore_bot_messages: true

# ---- AI 分类配置 ----
ai:
  provider: "ark"            # ark（火山引擎豆包大模型）/ lark（飞书内置 AI）
  model: "spark-lite"        # lark 模式时使用
  timeout: 30
  enabled: true
  ark_api_key: ""            # 也可通过环境变量 ARK_API_KEY 设置
  ark_endpoint_id: "ep-20260418212629-26ftq"
  ark_base_url: "https://ark.cn-beijing.volces.com/api/v3"
  classification_prompt: |
    你是一个消息分类助手。请对以下飞书群聊消息进行优先级分类。
    优先级定义：
    - P0（紧急）：生产环境故障、线上事故、安全事件
    - P1（重要）：客户严重问题、关键任务、紧急需求
    - P2（一般）：日常开发讨论、项目沟通
    - P3（低优）：闲聊、非工作话题
    请以 JSON 格式返回：{"priority": "P0/P1/P2/P3", "reason": "分类理由", "category": "类别"}

    消息内容：{message}

# ---- FAQ 知识库配置 ----
faq:
  enabled: false
  file_path: "faq.yaml"
  match_mode: "keyword"
  fuzzy_threshold: 0.6

# ---- 每日摘要报告配置 ----
report:
  enabled: true
  hour: 18
  minute: 0
  title_prefix: "飞书消息每日摘要"
  clear_after_report: true
  create_timeout: 60

# ---- 日志配置 ----
logging:
  level: "INFO"
  file_path: "listen_feishu.log"
  max_size_mb: 10
  backup_count: 5
  format: "%(asctime)s [%(levelname)s] %(name)s - %(message)s"
